steps:
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd backend
        npm ci --omit=dev
        node init-db.js
    env:
      - 'INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME}'
      - 'DB_USER=${_DB_USER}'
      - 'DB_PASS=${_DB_PASS}'
      - 'DB_NAME=${_DB_NAME}'
      - 'DATABASE_URL=${_DATABASE_URL}'

substitutions:
  _INSTANCE_CONNECTION_NAME: ''
  _DB_USER: ''
  _DB_PASS: ''
  _DB_NAME: 'streamhub'
  _DATABASE_URL: ''
